<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: transparent; }

    /* ── node-name hover ── */
    .edit-mode .node-text {
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.12s;
    }
    .edit-mode .node-text:hover {
      background: rgba(90, 125, 140, 0.14);
    }

    /* ── box-title hover ── */
    .edit-mode .card-title-row h2 {
      cursor: pointer;
      border-radius: 4px;
      padding: 1px 4px;
      margin: 0 -4px;
      transition: background 0.12s;
    }
    .edit-mode .card-title-row h2:hover {
      background: rgba(90, 125, 140, 0.12);
    }

    /* ── hint bar ── */
    #edit-hint {
      display: none;
      font-size: 12px;
      color: #5a7d8c;
      padding: 5px 10px;
      background: #eef3f5;
      border: 1px solid #c8d8de;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    #edit-hint.visible { display: block; }

    /* ── shared inline-edit widgets ── */
    .rt-edit-input {
      font: inherit;
      padding: 2px 6px;
      border: 2px solid #5a7d8c;
      border-radius: 4px;
      outline: none;
      min-width: 100px;
      max-width: 320px;
      color: #1c1c1e;
      background: #fff;
    }
    /* slightly larger input for the h2 */
    .rt-edit-input.title-input {
      font-size: 1.1em;
      font-weight: 600;
      max-width: 480px;
    }
    .rt-edit-save,
    .rt-edit-cancel {
      padding: 2px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 3px;
      vertical-align: middle;
    }
    .rt-edit-save   { background: #5a7d8c; color: #fff; }
    .rt-edit-cancel { background: #e5e5ea; color: #3a3a3c; }
    .rt-edit-save:hover   { background: #4a6a78; }
    .rt-edit-cancel:hover { background: #d1d1d6; }
  </style>
</head>
<body>
  <div id="edit-hint">
    &#9998; Click any <strong>person name</strong> or <strong>tree title</strong> to rename it
    &nbsp;·&nbsp; Enter to save, Esc to cancel
  </div>
  <div id="host"></div>

  <script>
  (function () {
    /* ── Streamlit component protocol (no external CDN) ── */
    var RENDER           = "streamlit:render";
    var COMPONENT_READY  = "streamlit:componentReady";
    var SET_VALUE        = "streamlit:setComponentValue";
    var SET_HEIGHT       = "streamlit:setFrameHeight";
    var API_VERSION      = 1;

    function send(type, data) {
      window.parent.postMessage(
        Object.assign({ isStreamlitMessage: true, type: type }, data || {}),
        "*"
      );
    }
    function setComponentValue(v) { send(SET_VALUE, { value: v, dataType: "json" }); }
    function setFrameHeight(h)    { send(SET_HEIGHT, { height: h }); }
    function ready()              { send(COMPONENT_READY, { apiVersion: API_VERSION }); }

    /* ── shared state ── */
    var editMode   = false;
    var activeEdit = null; // { wrap, origElem }

    /* ── helpers ── */
    function rerunScripts(container) {
      container.querySelectorAll('script').forEach(function (old) {
        var neo = document.createElement('script');
        Array.from(old.attributes).forEach(function (a) { neo.setAttribute(a.name, a.value); });
        neo.textContent = old.textContent;
        old.parentNode.replaceChild(neo, old);
      });
    }

    /* Build an inline edit widget that replaces `origElem` */
    function makeEditWidget(origElem, currentText, extraInputClass, onSave) {
      if (activeEdit) cancelEdit();

      var inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'rt-edit-input' + (extraInputClass ? ' ' + extraInputClass : '');
      inp.value = currentText;

      var saveBtn = document.createElement('button');
      saveBtn.type = 'button';
      saveBtn.className = 'rt-edit-save';
      saveBtn.textContent = 'Save';

      var cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.className = 'rt-edit-cancel';
      cancelBtn.textContent = 'Cancel';

      var wrap = document.createElement('span');
      wrap.appendChild(inp);
      wrap.appendChild(saveBtn);
      wrap.appendChild(cancelBtn);

      origElem.replaceWith(wrap);
      inp.focus();
      inp.select();

      activeEdit = { wrap: wrap, origElem: origElem };

      function doSave() {
        var v = inp.value.trim();
        if (!v) { inp.focus(); return; }
        activeEdit = null;
        origElem.textContent = v;       // optimistic update
        wrap.replaceWith(origElem);
        onSave(v);
      }
      function doCancel() { cancelEdit(); }

      saveBtn.addEventListener('click',   doSave);
      cancelBtn.addEventListener('click', doCancel);
      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Enter')  doSave();
        if (e.key === 'Escape') doCancel();
      });
    }

    function cancelEdit() {
      if (!activeEdit) return;
      activeEdit.wrap.replaceWith(activeEdit.origElem);
      activeEdit = null;
    }

    /* ── attach handlers: person names ── */
    function attachNodeHandlers(container) {
      container.querySelectorAll('.tree-node').forEach(function (tn) {
        var nodeRow  = tn.querySelector(':scope > .node-row');
        if (!nodeRow) return;
        var textSpan = nodeRow.querySelector('.node-text');
        if (!textSpan || textSpan.dataset.rteh) return;
        textSpan.dataset.rteh = '1';

        textSpan.addEventListener('click', function (e) {
          if (!editMode) return;
          e.stopPropagation();
          var nodeId = tn.dataset.nodeId || '';
          var boxId  = (tn.closest('.tree-card') || {}).id || '';
          makeEditWidget(textSpan, textSpan.textContent, '', function (newLabel) {
            setComponentValue({
              action: 'save-node',
              boxId: boxId,
              nodeId: nodeId,
              newLabel: newLabel,
              nonce: Date.now()
            });
          });
        });
      });
    }

    /* ── attach handlers: box/tree titles ── */
    function attachTitleHandlers(container) {
      container.querySelectorAll('.tree-card').forEach(function (card) {
        var h2 = card.querySelector('.card-title-row h2');
        if (!h2 || h2.dataset.rtth) return;
        h2.dataset.rtth = '1';

        h2.addEventListener('click', function (e) {
          if (!editMode) return;
          e.stopPropagation();
          var boxId = card.id || '';
          makeEditWidget(h2, h2.textContent, 'title-input', function (newTitle) {
            setComponentValue({
              action: 'save-box-title',
              boxId: boxId,
              newTitle: newTitle,
              nonce: Date.now()
            });
          });
        });
      });
    }

    /* ── render loop ── */
    function onRender(args) {
      var treeHtml   = (args && args.treeHtml)   || '';
      var em         = !!(args && args.editMode);
      var treeHeight = (args && args.treeHeight) || 600;

      editMode = em;

      document.getElementById('edit-hint').className = em ? 'visible' : '';

      var host = document.getElementById('host');
      host.className = em ? 'edit-mode' : '';

      var sig = treeHtml.length + '|' + treeHtml.slice(0, 120);
      if (host.dataset.sig !== sig) {
        host.innerHTML = treeHtml;
        rerunScripts(host);
        host.dataset.sig = sig;
      }

      if (em) {
        attachNodeHandlers(host);
        attachTitleHandlers(host);
      }

      setFrameHeight(treeHeight + 48);
    }

    window.addEventListener("message", function (event) {
      var data = event.data;
      if (!data || data.type !== RENDER) return;
      onRender(data.args || {});
    });

    ready();
    setFrameHeight(640);
  })();
  </script>
</body>
</html>
