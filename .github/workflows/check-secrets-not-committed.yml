name: Block committed secrets.toml

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  no-secrets-in-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if secrets.toml is tracked
        run: |
          if git ls-files --error-unmatch .streamlit/secrets.toml >/dev/null 2>&1; then
            echo "::error::.streamlit/secrets.toml is tracked by git. Remove it and rotate any exposed secrets."
            exit 1
          fi
          echo "OK: secrets.toml is not in the repository."

      - name: Fail if .env is tracked
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env is tracked by git. Remove it and rotate any exposed secrets."
            exit 1
          fi
          echo "OK: .env is not in the repository."
